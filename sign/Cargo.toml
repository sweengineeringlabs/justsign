[package]
name        = "swe_justsign_sign"
version     = "0.1.0"
description = "High-level sign / verify API — blob, OCI artifact, attestation. Composes spec + fulcio + tuf + rekor + RustCrypto primitives."
readme      = "../README.md"
keywords    = ["sigstore", "cosign", "signing", "attestation", "verification"]
categories  = ["cryptography"]
edition.workspace      = true
license.workspace      = true
repository.workspace   = true
homepage.workspace     = true
authors.workspace      = true
rust-version.workspace = true

[lib]
name = "sign"
path = "src/lib.rs"

[dependencies]
thiserror = { workspace = true }
spec      = { workspace = true }
fulcio    = { workspace = true }
tuf       = { workspace = true }
rekor     = { workspace = true }

[lints]
workspace = true
