# mdBook documentation site published to GitHub Pages.
#
# Triggers on push to `main` (after the dev -> test -> int -> uat ->
# prd -> main cascade promotes a change). Workflow_dispatch also
# available for manual rebuilds without a content change.
#
# Requires Pages to be enabled in repo settings:
#   Settings -> Pages -> Source: GitHub Actions
# The first successful run publishes the site at
# https://sweengineeringlabs.github.io/justsign/.

name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Don't cancel an in-progress deploy mid-publish; let it finish so the
# site stays consistent. Subsequent pushes queue.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  MDBOOK_VERSION: "0.4.40"

jobs:
  build:
    name: build mdbook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install mdBook
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: mdbook build
        run: mdbook build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

  deploy:
    name: deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
