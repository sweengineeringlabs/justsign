# Staging tests for justsign.
#
# These jobs talk to real Sigstore staging endpoints
# (fulcio.sigstage.dev / rekor.sigstage.dev). They run:
#
#   - Nightly at 02:00 UTC — continuous wire-format drift detection
#   - On manual dispatch — on-demand verification
#
# NOT on push or pull_request because:
#   1. Staging enforces rate quotas; per-push runs would burn through
#      budget shared with the wider Sigstore community.
#   2. The default `cargo test` flow prints a SKIP line and returns
#      success when env vars are unset — running on every push would
#      silently mask drift on forks lacking secrets.
#
# Fulcio job: on scheduled runs the GitHub Actions OIDC token is
# self-issued (id-token: write permission). On manual dispatch a
# stored JUSTSIGN_OIDC_TOKEN secret is used as fallback.

name: Staging

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fulcio:
    name: cargo test (staging-fulcio)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      JUSTSIGN_FULCIO_STAGING: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Fetch OIDC token (scheduled) or use stored secret (manual)
        # Scheduled runs self-issue a GitHub Actions OIDC token scoped
        # to the sigstore audience — no stored secret needed.
        # Manual dispatch falls back to JUSTSIGN_OIDC_TOKEN secret for
        # cases where a human wants to supply a different identity.
        run: |
          if [ -n "${{ secrets.JUSTSIGN_OIDC_TOKEN }}" ]; then
            echo "JUSTSIGN_OIDC_TOKEN=${{ secrets.JUSTSIGN_OIDC_TOKEN }}" >> "${GITHUB_ENV}"
          else
            TOKEN=$(curl -fsSL \
              -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sigstore" \
              | jq -r '.value')
            echo "JUSTSIGN_OIDC_TOKEN=${TOKEN}" >> "${GITHUB_ENV}"
          fi
      - name: cargo test (skip-pass)
        run: cargo test -p swe_justsign_fulcio test_http_fulcio_client_signs_cert_against_staging -- --nocapture

  rekor:
    name: cargo test (staging-rekor)
    runs-on: ubuntu-latest
    env:
      JUSTSIGN_REKOR_STAGING: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (skip-pass)
        run: cargo test -p swe_justsign_rekor test_http_rekor_client_round_trips_against_staging -- --nocapture

  pkcs11:
    name: cargo test (pkcs11 + softhsm2)
    runs-on: ubuntu-latest
    # Linux-only because:
    #   - softhsm2 is the standard test fixture and ships as an
    #     apt package; equivalent install on macOS/Windows runners
    #     is more invasive and adds no signal here.
    #   - The Pkcs11Signer code itself is portable (cryptoki loads
    #     .so / .dll / .dylib at runtime); we'd be testing the
    #     fixture, not the signer.
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install SoftHSM2 + opensc
        # softhsm2     — software PKCS#11 token (provides
        #                /usr/lib/softhsm/libsofthsm2.so).
        # opensc       — provides pkcs11-tool, used below to mint
        #                the ECDSA P-256 keypair on the token.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends softhsm2 opensc

      - name: Initialise token + mint ECDSA P-256 key
        # softhsm2-util reassigns the slot id on init, so we read
        # back the new id with `softhsm2-util --show-slots` and
        # parse the first slot whose label matches.
        #
        # Mechanism: ECDSA P-256 — we ask pkcs11-tool to generate
        # the keypair on the token, attaching CKA_LABEL=justsign-e2e
        # so the test's JUSTSIGN_SOFTHSM_KEY_LABEL env var points at
        # exactly that key.
        run: |
          set -euxo pipefail
          mkdir -p "${HOME}/softhsm2-tokens"
          cat > "${HOME}/softhsm2.conf" <<EOF
          directories.tokendir = ${HOME}/softhsm2-tokens
          objectstore.backend = file
          log.level = INFO
          EOF
          export SOFTHSM2_CONF="${HOME}/softhsm2.conf"

          softhsm2-util --init-token --free \
            --label justsign-e2e \
            --so-pin 1234 --pin 5678

          # Discover the post-init slot id. softhsm2-util prints
          # one slot per token; the label we just set is unique.
          SLOT=$(softhsm2-util --show-slots \
            | awk '/^Slot [0-9]+/ { slot=$2 } /Label:[[:space:]]+justsign-e2e/ { print slot; exit }')
          echo "softhsm slot: ${SLOT}"

          pkcs11-tool \
            --module /usr/lib/softhsm/libsofthsm2.so \
            --token-label justsign-e2e \
            --pin 5678 \
            --keypairgen \
            --key-type EC:prime256v1 \
            --label justsign-e2e \
            --usage-sign

          # Export for the test step. GHA's $GITHUB_ENV is the only
          # cross-step way to push env vars from a shell step.
          {
            echo "SOFTHSM2_CONF=${HOME}/softhsm2.conf"
            echo "JUSTSIGN_SOFTHSM_LIB=/usr/lib/softhsm/libsofthsm2.so"
            echo "JUSTSIGN_SOFTHSM_PIN=5678"
            echo "JUSTSIGN_SOFTHSM_KEY_LABEL=justsign-e2e"
            echo "JUSTSIGN_SOFTHSM_SLOT_ID=${SLOT}"
          } >> "${GITHUB_ENV}"

      - name: cargo test (pkcs11 e2e)
        run: |
          cargo test -p swe_justsign_sign --features pkcs11 \
            test_pkcs11_signer_signs_against_softhsm_when_configured \
            -- --nocapture

  tuf:
    name: cargo test (live-tuf)
    runs-on: ubuntu-latest
    env:
      # Opt-in flag: matches the JUSTSIGN_*_STAGING pattern used by
      # the fulcio + rekor jobs above. The integration test no-ops
      # with a SKIP line when this is unset.
      JUSTSIGN_TUF_LIVE: "1"
      # Path to a trusted Sigstore TUF bootstrap root.json. Stored
      # as a repo secret (audited out-of-band). The test SKIPs
      # without this so forks that lack the secret still see a
      # green box.
      JUSTSIGN_TUF_BOOTSTRAP: ${{ secrets.JUSTSIGN_TUF_BOOTSTRAP }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (skip-pass)
        run: cargo test -p swe_justsign_tuf --test live_sigstore test_tuf_client_walks_real_sigstore_chain_when_configured -- --nocapture
